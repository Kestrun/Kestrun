permissions:
    contents: read
    pull-requests: read

name: CI (core)

on:
    workflow_call:
        inputs:
            is_pr:
                description: Whether the workflow runs for a pull request context.
                required: true
                type: boolean
            debug:
                description: Enable debug logging when invoked manually.
                required: false
                default: false
                type: boolean
        secrets:
            UPSTASH_REDIS_URL:
                description: Redis URL for session testing
                required: false

concurrency:
    group: ci-${{ github.repository }}-${{ inputs.is_pr && github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Linting
        uses: Kestrun/Kestrun/.github/workflows/lint.yml@main
        with:
            is_pr: ${{ inputs.is_pr }}

    build:
        needs: lint
        strategy:
            fail-fast: false
            matrix:
                os:
                    [
                        ubuntu-24.04,
                        ubuntu-22.04,
                        macos-15,
                        macos-14,
                        windows-2022,
                        windows-2025,
                        ubuntu-24.04-arm,
                        windows-11-arm,
                    ]
                pwsh: ["7.4.14", "7.5.5", "latest"]
        runs-on: ${{ matrix.os }}

        defaults:
            run:
                working-directory: ${{ github.workspace }}

        env:
            POWERSHELL_DISTRIBUTION_CHANNEL: GitHub-Actions
            UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
            GITHUB_TOKEN: ${{ github.token }}
            KESTRUN_TEST_HANG_TIMEOUT: 5m

        steps:
            - name: 🔎 Detect GH debug flag
              id: detect_debug
              shell: bash
              run: |
                  gh_debug=false
                  if [[ "${{ inputs.debug }}" == "true" || "${{ runner.debug }}" == "1" ]]; then
                    gh_debug=true
                  fi
                  echo "gh_debug=$gh_debug" >> "$GITHUB_OUTPUT"

            - name: 🛎️ Checkout
              uses: actions/checkout@v6.0.2

            - name: 🧰 Install PowerShell
              uses: ./.github/actions/Install-PowerShell
              with:
                  Version: ${{ matrix.pwsh }}

            - name: 🧰 Setup .NET 10
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.x"

            - name: 🧰 Install QUIC runtime (Ubuntu)
              if: startsWith(matrix.os, 'ubuntu-')
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libmsquic
                  sudo ldconfig

            - name: 🔧 Enable debug flags
              if: ${{ steps.detect_debug.outputs.gh_debug == 'true' }}
              shell: bash
              run: |
                  {
                    echo "ACTIONS_STEP_DEBUG=true"
                    echo "ACTIONS_RUNNER_DEBUG=true"
                    echo "COREHOST_TRACE=1"
                    echo "COREHOST_TRACE_VERBOSITY=3"
                    echo "DOTNET_HOST_TRACE=1"
                    echo "DOTNET_HOST_TRACE_VERBOSITY=3"
                  } >> "$GITHUB_ENV"

            - name: 🔧 Echo debug flag
              if: ${{ always() && github.event_name != '' }}
              run: echo "debug=${{ steps.detect_debug.outputs.gh_debug }}  event=${{ github.event_name }}"

            - name: 🔧 Set build verbosity
              shell: bash
              run: |
                  if [[ "${{ steps.detect_debug.outputs.gh_debug }}" == "true" ]]; then
                    echo "DOTNET_VERBOSITY=detailed" >> "$GITHUB_ENV"
                    echo "PESTER_VERBOSITY=Detailed" >> "$GITHUB_ENV"
                  else
                    echo "DOTNET_VERBOSITY=minimal" >> "$GITHUB_ENV"
                    echo "PESTER_VERBOSITY=Normal" >> "$GITHUB_ENV"
                  fi
                  echo "Resolved debug=${{ steps.detect_debug.outputs.gh_debug }}"
                  echo "Resolved DOTNET_VERBOSITY=${DOTNET_VERBOSITY:-unset} (will be available in later steps)"
                  echo "Resolved PESTER_VERBOSITY=${PESTER_VERBOSITY:-unset} (will be available in later steps)"

            - name: 🧰 Install Module Invoke-Build
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  Install-Module InvokeBuild -Force -Scope CurrentUser

            - name: 🧰 Install Module Pester (pin)
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  Install-Module Pester -Force -Scope CurrentUser -RequiredVersion 5.6.1
                  Get-Module Pester -ListAvailable | Select Name,Version,Path

            - name: 🔎 Print runtime context
              shell: pwsh
              run: |
                  $PSVersionTable
                  dotnet --info
                  [System.Runtime.InteropServices.RuntimeInformation]::FrameworkDescription
                  [System.Environment]::Version

            - name: 📦 Restore solution
              shell: pwsh
              run: |
                  Write-Host "Environment check before calling build script..."
                  if ($env:UPSTASH_REDIS_URL) {
                      Write-Host "UPSTASH_REDIS_URL is available in workflow (length: $($env:UPSTASH_REDIS_URL.Length))" -ForegroundColor Green
                  } else {
                      Write-Host "UPSTASH_REDIS_URL is NOT available in workflow" -ForegroundColor Red
                  }
                  Invoke-Build Restore -DotNetVerbosity $Env:DOTNET_VERBOSITY

            - name: 🔧 Run C# Build
              shell: pwsh
              run: |
                  Write-Host "Environment check before calling build script..."
                  if ($env:UPSTASH_REDIS_URL) {
                      Write-Host "UPSTASH_REDIS_URL is available in workflow (length: $($env:UPSTASH_REDIS_URL.Length))" -ForegroundColor Green
                  } else {
                      Write-Host "UPSTASH_REDIS_URL is NOT available in workflow" -ForegroundColor Red
                  }
                  $ErrorActionPreference = 'Stop'
                  Invoke-Build Build -DotNetVerbosity $Env:DOTNET_VERBOSITY

            - name: 📦 Pack Kestrun.Tool for testing
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  Invoke-Build 'Pack-KestrunTool' -DotNetVerbosity $Env:DOTNET_VERBOSITY

            - name: 🧰 Install Kestrun.Tool from local artifacts for testing
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  $localToolPath = Join-Path -Path $PWD -ChildPath 'artifacts/nuget'
                  dotnet tool install --global Kestrun.Tool --add-source $localToolPath --prerelease --ignore-failed-sources

                  $dotnetToolsPath = Join-Path -Path $HOME -ChildPath '.dotnet/tools'
                  $dotnetToolsPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

            - name: Install Kestrun Module
              shell: pwsh
              run: |
                  Invoke-Build Install-Module

            - name: Query Kestrun Module Info
              shell: pwsh
              run: |
                  dotnet kestrun module info

            - name: 🧪 Run xUnit Tests
              timeout-minutes: 45
              shell: pwsh
              run: |
                  Write-Host "Environment check before calling xUnit test script..."
                  if ($env:UPSTASH_REDIS_URL) {
                      Write-Host "UPSTASH_REDIS_URL is available in workflow (length: $($env:UPSTASH_REDIS_URL.Length))" -ForegroundColor Green
                  } else {
                      Write-Host "UPSTASH_REDIS_URL is NOT available in workflow" -ForegroundColor Red
                  }
                  $ErrorActionPreference = 'Stop'
                  Invoke-Build Test-xUnit -DotNetVerbosity $Env:DOTNET_VERBOSITY

            - name: 🧪 Run Pester Tests (Non-Tutorial)
              timeout-minutes: 35
              shell: pwsh
              run: |
                  Write-Host "Environment check before calling Pester test script..."
                  if ($env:UPSTASH_REDIS_URL) {
                      Write-Host "UPSTASH_REDIS_URL is available in workflow (length: $($env:UPSTASH_REDIS_URL.Length))" -ForegroundColor Green
                  } else {
                      Write-Host "UPSTASH_REDIS_URL is NOT available in workflow" -ForegroundColor Red
                  }
                  $ErrorActionPreference = 'Stop'
                  Invoke-Build Test-Pester-NonTutorial -PesterVerbosity $Env:PESTER_VERBOSITY

            - name: 📘 Run Tutorial Tests (1/2)
              timeout-minutes: 70
              shell: pwsh
              run: |
                  Write-Host "Environment check before calling tutorial test script..."
                  if ($env:UPSTASH_REDIS_URL) {
                      Write-Host "UPSTASH_REDIS_URL is available in workflow (length: $($env:UPSTASH_REDIS_URL.Length))" -ForegroundColor Green
                  } else {
                      Write-Host "UPSTASH_REDIS_URL is NOT available in workflow" -ForegroundColor Red
                  }
                  $ErrorActionPreference = 'Stop'
                  Invoke-Build Test-Pester-Tutorial-Shard1 -PesterVerbosity $Env:PESTER_VERBOSITY

            - name: 📘 Run Tutorial Tests (2/2)
              timeout-minutes: 70
              shell: pwsh
              run: |
                  Write-Host "Environment check before calling tutorial test script..."
                  if ($env:UPSTASH_REDIS_URL) {
                      Write-Host "UPSTASH_REDIS_URL is available in workflow (length: $($env:UPSTASH_REDIS_URL.Length))" -ForegroundColor Green
                  } else {
                      Write-Host "UPSTASH_REDIS_URL is NOT available in workflow" -ForegroundColor Red
                  }
                  $ErrorActionPreference = 'Stop'
                  Invoke-Build Test-Pester-Tutorial-Shard2 -PesterVerbosity $Env:PESTER_VERBOSITY

            - name: 📤 Upload diagnostics on failure
              if: ${{ failure() || cancelled() }}
              uses: actions/upload-artifact@v7
              with:
                  name: diagnostics-${{ matrix.os }}-pwsh-${{ matrix.pwsh }}-${{ strategy.job-index }}
                  path: |
                      **/TestResults/**
                      **/*.diag.log
                      **/*Sequence*.xml
                      **/*hangdump*
                      **/*_blame/**
                      **/bin/**
                      **/obj/project.assets.json
                      src/PowerShell/Kestrun/**/*
                      ./*.log
                      ./msbuild.binlog

            - name: 🧑‍💻 Live SSH (only if failed/cancelled and debug enabled)
              if: ${{ (failure() || cancelled()) && steps.detect_debug.outputs.gh_debug == 'true' }}
              uses: mxschmitt/action-tmate@v3
              with:
                  limit-access-to-actor: true
