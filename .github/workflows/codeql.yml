name: CodeQL
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        - cron: "15 5 * * 3" # weekly baseline scan

permissions:
    contents: read
    pull-requests: read

concurrency:
    group: codeql-${{ github.repository }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Linting
        uses: Kestrun/Kestrun/.github/workflows/lint.yml@main
        with:
            is_pr: ${{ github.event_name == 'pull_request' }}

    # --- CodeQL for C# and GitHub Actions ---
    codeql:
        name: CodeQL (${{ matrix.language }})
        runs-on: ubuntu-latest
        needs: lint
        permissions:
            contents: read
            actions: read
            security-events: write
        strategy:
            fail-fast: false
            matrix:
                language: [csharp, actions]
        steps:
            - uses: actions/checkout@v6.0.2

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v4
              with:
                  languages: ${{ matrix.language }}
            # queries: security-extended  # optional: stricter rules

            # Build C# so your DLLs exist (good for your optional import check)
            - name: 🧰 Setup .NET 10
              if: matrix.language == 'csharp'
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.x"

            - name: 🧰 Install Invoke-Build
              if: matrix.language == 'csharp'
              shell: pwsh
              run: Install-Module InvokeBuild -Force -Scope CurrentUser

            - name: 📦 Restore solution
              if: matrix.language == 'csharp'
              shell: pwsh
              run: Invoke-Build Restore -DotNetVerbosity minimal

            - name: 🔧 Run C# Build
              if: matrix.language == 'csharp'
              shell: pwsh
              run: Invoke-Build Build -DotNetVerbosity minimal

            - name: Analyze
              uses: github/codeql-action/analyze@v4
              with:
                  category: "/language:${{ matrix.language }}"

    # --- PowerShell via PSScriptAnalyzer -> SARIF upload ---
    powershell-analysis:
      name: PowerShell (PSScriptAnalyzer)
      runs-on: windows-latest
      needs: lint
      permissions:
        contents: read
        security-events: write
      steps:
        - uses: actions/checkout@v6.0.2

        - name: Install PSScriptAnalyzer + SARIF converter
          shell: pwsh
          run: |
            Install-PSResource -Name PSScriptAnalyzer -Scope CurrentUser -TrustRepository
            # Show ALL installed versions (for debugging)
            Write-Host "=== Installed versions ==="
            Get-Module PSScriptAnalyzer -ListAvailable |
            Sort-Object Version -Descending |
            Format-Table Name, Version, Path

            # Force import the latest one
            $module = Get-Module PSScriptAnalyzer -ListAvailable |
            Sort-Object Version -Descending |
            Select-Object -First 1

            Import-Module $module.Path -Force

            # Show the version actually loaded in the session
            Write-Host "=== Loaded version ==="
            Get-Module PSScriptAnalyzer | Format-List Name, Version, Path

        - name: Run PSScriptAnalyzer and emit SARIF
          shell: pwsh
          run: |
                $ErrorActionPreference = 'Continue'

                $files = Get-ChildItem .\src\PowerShell\Kestrun -Recurse -File -Include *.ps1,*.psd1,*.psm1 |
                Where-Object { $_.FullName -notlike '*\Kestrun.psm1' }

                $allResults = @()
                $crashedFiles = @()

                foreach ($file in $files) {
                Write-Host "🔍 Analyzing: $($file.FullName)"

                try {
                    $res = Invoke-ScriptAnalyzer `
                    -Path $file.FullName `
                    -Settings .\PSScriptAnalyzerSettings.psd1 `
                    -Severity @('Error','Warning','Information') `
                    -ErrorAction Stop

                    if ($res) {
                    $allResults += $res
                    }
                }
                catch {
                    Write-Host "💥 CRASHED on file:"
                    Write-Host $file.FullName

                    $_ | Format-List * -Force

                    $crashedFiles += $file.FullName
                }
                }

                # Always produce SARIF (even partial)
                @($allResults) | ConvertTo-Sarif | Out-File -Encoding utf8 pssa.sarif

                Write-Host "=== Summary ==="
                Write-Host "Crashed files count: $($crashedFiles.Count)"

                if ($crashedFiles.Count -gt 0) {
                Write-Host "Files causing PSScriptAnalyzer crash:"
                $crashedFiles | ForEach-Object { Write-Host " - $_" }
                }

                # Optional: fail build if crashes happened
                if ($crashedFiles.Count -gt 0) {
                throw "PSScriptAnalyzer crashed on $($crashedFiles.Count) file(s)."
                }

                # Optional: still enforce error diagnostics
                if ($allResults | Where-Object Severity -eq 'Error') {
                throw "PSScriptAnalyzer found error-level issues."
                }

        - name: ⬆️ Upload PSSA SARIF
          uses: github/codeql-action/upload-sarif@v4
          with:
            sarif_file: pssa.sarif
            category: powershell
