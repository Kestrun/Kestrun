name: CodeQL
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        - cron: "15 5 * * 3" # weekly baseline scan

permissions:
    contents: read
    pull-requests: read

concurrency:
    group: codeql-${{ github.repository }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Linting
        uses: Kestrun/Kestrun/.github/workflows/lint.yml@main
        with:
            is_pr: ${{ github.event_name == 'pull_request' }}

    # --- CodeQL for C# and GitHub Actions ---
    codeql:
        name: CodeQL (${{ matrix.language }})
        runs-on: ubuntu-latest
        needs: lint
        permissions:
            contents: read
            actions: read
            security-events: write
        strategy:
            fail-fast: false
            matrix:
                language: [csharp, actions]
        steps:
            - uses: actions/checkout@v6.0.2

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v4
              with:
                  languages: ${{ matrix.language }}
            # queries: security-extended  # optional: stricter rules

            # Build C# so your DLLs exist (good for your optional import check)
            - name: 🧰 Setup .NET 10
              if: matrix.language == 'csharp'
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.x"

            - name: 🧰 Install Invoke-Build
              if: matrix.language == 'csharp'
              shell: pwsh
              run: Install-Module InvokeBuild -Force -Scope CurrentUser

            - name: 📦 Restore solution
              if: matrix.language == 'csharp'
              shell: pwsh
              run: Invoke-Build Restore -DotNetVerbosity minimal

            - name: 🔧 Run C# Build
              if: matrix.language == 'csharp'
              shell: pwsh
              run: Invoke-Build Build -DotNetVerbosity minimal

            - name: Analyze
              uses: github/codeql-action/analyze@v4
              with:
                  category: "/language:${{ matrix.language }}"

    # --- PowerShell via PSScriptAnalyzer -> SARIF upload ---
    powershell-analysis:
      name: PowerShell (PSScriptAnalyzer)
      runs-on: windows-latest
      needs: lint
      permissions:
        contents: read
        security-events: write
      steps:
        - uses: actions/checkout@v6.0.2

        - name: Install PSScriptAnalyzer + SARIF converter
          shell: pwsh
          run: |
            Install-PSResource -Name PSScriptAnalyzer -Scope CurrentUser -TrustRepository
            # Show ALL installed versions (for debugging)
            Write-Host "=== Installed versions ==="
            Get-Module PSScriptAnalyzer -ListAvailable |
            Sort-Object Version -Descending |
            Format-Table Name, Version, Path

            # Force import the latest one
            $module = Get-Module PSScriptAnalyzer -ListAvailable |
            Sort-Object Version -Descending |
            Select-Object -First 1

            Import-Module $module.Path -Force

            # Show the version actually loaded in the session
            Write-Host "=== Loaded version ==="
            Get-Module PSScriptAnalyzer | Format-List Name, Version, Path

        - name: Run PSScriptAnalyzer and isolate crash
          shell: pwsh
          run: |
            $ErrorActionPreference = 'Stop'

            Write-Host "=== Loaded PSScriptAnalyzer ==="
            Get-Module PSScriptAnalyzer | Format-List Name,Version,Path

            Write-Host "=== Test 1: no settings file ==="
            try {
            Invoke-ScriptAnalyzer `
                -Path .\src\PowerShell\Kestrun `
                -Recurse `
                -ExcludeRule PSAvoidReservedCharInCmdlet `
                -Severity @('Error','Warning','Information') | Out-Null
            Write-Host "OK: no-settings run succeeded"
            }
            catch {
            Write-Host "FAIL: no-settings run crashed"
            $_ | Format-List * -Force
            throw
            }

            Write-Host "=== Test 2: minimal settings ==="
            $minimalSettings = @{
            IncludeDefaultRules = $true
            ExcludeRules = @(
                'PSAvoidUsingWriteHost'
                'PSUseBOMForUnicodeEncodedFile'
                'PSAvoidReservedCharInCmdlet'
            )
            }

            $minimalPath = Join-Path $PWD 'PSSA.Minimal.psd1'
            $minimalSettings | Export-PowerShellDataFile -Path $minimalPath

            try {
            Invoke-ScriptAnalyzer `
                -Path .\src\PowerShell\Kestrun `
                -Recurse `
                -Settings $minimalPath `
                -Severity @('Error','Warning','Information') | Out-Null
            Write-Host "OK: minimal-settings run succeeded"
            }
            catch {
            Write-Host "FAIL: minimal-settings run crashed"
            $_ | Format-List * -Force
            throw
            }

            Write-Host "=== Test 3: full settings ==="
            $results = Invoke-ScriptAnalyzer `
            -Path .\src\PowerShell\Kestrun `
            -Recurse `
            -Settings .\PSScriptAnalyzerSettings.psd1 `
            -Severity @('Error','Warning','Information')

            @($results) | ConvertTo-Sarif | Out-File -Encoding utf8 pssa.sarif

            if ($results | Where-Object Severity -eq 'Error') {
            throw "PSScriptAnalyzer found error-level issues."
            }

        - name: Run PSScriptAnalyzer and emit SARIF
          shell: pwsh
          run: |
            $ErrorActionPreference = 'Stop'

            Write-Host "=== Discovering installed PSScriptAnalyzer versions ==="
            $all = Get-Module PSScriptAnalyzer -ListAvailable |
            Sort-Object Version -Descending

            if (-not $all) {
            throw "PSScriptAnalyzer is not installed."
            }

            $latest = $all | Select-Object -First 1

            $all | Format-Table Name, Version, Path

            Write-Host "=== Forcing latest version ==="
            Write-Host "Using version: $($latest.Version)"
            Write-Host "From path: $($latest.Path)"

            # Remove any already loaded version (important!)
            Remove-Module PSScriptAnalyzer -ErrorAction SilentlyContinue -Force

            # Import EXACT version
            Import-Module $latest.Path -Force

            # Validate loaded version
            $loaded = Get-Module PSScriptAnalyzer

            if (-not $loaded) {
            throw "Failed to load PSScriptAnalyzer."
            }

            if ($loaded.Version -ne $latest.Version) {
            throw "Wrong PSScriptAnalyzer version loaded. Expected $($latest.Version), got $($loaded.Version)"
            }

            Write-Host "=== Loaded version ==="
            $loaded | Format-List Name, Version, Path

            # --- Run analyzer ---
            $results = Invoke-ScriptAnalyzer `
              -Path .\src\PowerShell\Kestrun `
              -Recurse `
              -Settings .\PSScriptAnalyzerSettings.psd1 `
              -Severity @('Error','Warning','Information')

            # Always produce a sarif file (even if results is empty)
            $results | ConvertTo-Sarif | Out-File -Encoding utf8 pssa.sarif

            # Optionally fail if any error-level diagnostics exist
            if ($results | Where-Object Severity -eq 'Error') {
              throw "PSScriptAnalyzer found error-level issues."
            }

        - name: ⬆️ Upload PSSA SARIF
          uses: github/codeql-action/upload-sarif@v4
          with:
            sarif_file: pssa.sarif
            category: powershell
